*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;font-size:13px;background:#f4f4f1;color:#1a1a1a;padding:10px;text-transform:uppercase}
h1{font-size:17px;font-weight:500;margin-bottom:10px}
.toolbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.toolbar input[type=text]{padding:5px 9px;border:1px solid #ccc;border-radius:5px;font-size:13px;width:180px}
select{padding:5px 8px;border:1px solid #ccc;border-radius:5px;font-size:12px;background:#fff}
button{padding:5px 10px;border:1px solid #ccc;border-radius:5px;font-size:12px;background:#fff;cursor:pointer}
button:hover{background:#e8e8e8}
button.primary{background:#1a73e8;color:#fff;border-color:#1a73e8}
button.primary:hover{background:#1558b0}
button.danger{background:#c62828;color:#fff;border-color:#c62828}
button.danger:hover{background:#a31f1f}
button.sm{padding:2px 7px;font-size:11px}
button.icon{padding:2px 7px;font-size:12px;border:1px solid #ddd;background:#fff}
button.icon:hover{background:#eee}
.section{margin-bottom:14px}
.sec-head{display:flex;align-items:center;gap:8px;padding:5px 10px;background:#deded8;border-radius:6px 6px 0 0;font-weight:500;font-size:12px;user-select:none}
.sec-head .arr{font-size:10px;margin-left:auto}
.sec-head-btns{display:flex;gap:4px;margin-left:8px}
.sec-head-btn{padding:1px 6px;font-size:10px;border:1px solid #bbb;border-radius:3px;background:#f0f0ec;cursor:pointer;text-transform:uppercase;font-weight:600}
.sec-head-btn:hover{background:#e0e0da}
.sec-head-btn.del{border-color:#e8a0a0;color:#c00;background:#fff0f0}
.sec-head-btn.del:hover{background:#ffe0e0}
.sec-toggle{cursor:pointer;flex:1}
table{width:100%;border-collapse:collapse;background:#fff;border:1px solid #ddd;border-top:none;table-layout:fixed}
th{background:#efefeb;font-weight:500;font-size:11px;padding:5px 6px;text-align:left;border-bottom:1px solid #ddd}
td{padding:4px 6px;border-bottom:1px solid #f2f2f0;vertical-align:middle;font-size:12px;overflow:hidden}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf7}
.item-name{font-weight:500;font-size:12px}
.item-note{font-size:10px;color:#777;margin-top:1px}
.qty-wrap{display:flex;align-items:center;gap:3px}
.qty-val{min-width:40px;text-align:center;font-size:12px;padding:2px 4px}
.bin-sel{padding:2px 4px;border:1px solid #ccc;border-radius:4px;font-size:11px;background:#fff;max-width:62px}
.meal-tag{display:inline-block;padding:0 5px;background:#fff8dc;border:1px solid #e6c84a;border-radius:8px;font-size:10px;color:#7a6000;margin-left:4px}
.zero-tag{display:inline-block;padding:0 5px;background:#fce8e8;border:1px solid #e8a0a0;border-radius:8px;font-size:10px;color:#8b0000;margin-left:4px}
.meal-box{background:#fffbea;border:1px solid #e6c84a;border-radius:8px;padding:10px;margin-bottom:12px}
.meal-box-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.meal-box-head h2{font-size:13px;font-weight:500}
.meal-loc-btn{font-size:11px;color:#555;border:1px solid #ccc;border-radius:4px;padding:2px 7px;background:#fff;cursor:pointer}
.meal-grid{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px;min-height:26px}
.meal-item{background:#fff;border:1px solid #ddd;border-radius:5px;padding:4px 8px;font-size:11px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.meal-item-name{font-weight:500}
.meal-item-qty{font-size:12px;font-weight:500;min-width:18px;text-align:center}
.meal-item-unit{font-size:10px;color:#888}
.undo-bar{font-size:11px;color:#555;display:flex;align-items:center;gap:6px;margin-top:4px;min-height:18px}
.legend{font-size:10px;color:#888;margin-top:6px}
.backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:200;align-items:center;justify-content:center}
.backdrop.open{display:flex}
.modal{background:#fff;border-radius:10px;padding:18px;max-width:440px;width:95%;max-height:90vh;overflow-y:auto}
.modal h3{font-size:14px;font-weight:500;margin-bottom:12px}
.fr{margin-bottom:9px}
.fr label{display:block;font-size:11px;color:#555;margin-bottom:2px}
.fr input,.fr select,.fr textarea{width:100%;padding:5px 8px;border:1px solid #ccc;border-radius:4px;font-size:12px}
.fr textarea{resize:vertical;min-height:50px}
.modal-btns{display:flex;gap:6px;justify-content:flex-end;margin-top:12px}
.calc-box{background:#f0f4ff;border:1px solid #b0c4f0;border-radius:5px;padding:7px;margin-top:5px;font-size:11px}
.calc-box input{width:72px;padding:2px 4px;border:1px solid #ccc;border-radius:3px;font-size:11px;margin:0 3px}
.save-indicator{font-size:11px;color:#388e3c;margin-left:auto}
.add-section-bar{display:flex;gap:6px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.add-section-bar input{padding:5px 9px;border:1px solid #ccc;border-radius:5px;font-size:12px;width:200px}
</style>
</head>

<div id="sync-bar" style="background:#e8f0fe;border-bottom:1px solid #aac4f5;padding:6px 16px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:11px;margin-bottom:10px;">

  <span id="sync-status" style="font-size:11px;font-weight:600;font-family:monospace;"></span>
</div>

<h1>Freezer Inventory</h1>
<div class="toolbar">
  <input type="text" id="srch" placeholder="Search…" oninput="render()">
  <select id="binF" onchange="render()">
    <option value="">All bins</option>
    <option value="T">Top</option>
    <option value="L">Left</option>
    <option value="R">Right</option>
  </select>
  <button class="primary" onclick="openAdd()">+ Add item</button>
  <span class="save-indicator" id="saveInd"></span>
  <button onclick="dl()" style="margin-left:8px">⬇ Download backup</button>
</div>

<div class="meal-box">
  <div class="meal-box-head">
    <h2>Meal Bag</h2>
    <button class="meal-loc-btn" onclick="editMealLoc()" id="mealLocBtn">📍 Right bin</button>
    <button class="sm danger" onclick="clearMealBag()" style="margin-left:auto">🗑 Clear all — new week</button>
  </div>
  <div class="meal-grid" id="mealGrid"></div>
  <div class="legend">− = ate 1 svg &nbsp;|&nbsp; + = put 1 back to main &nbsp;|&nbsp; ✕ = cancel item (all back to main) &nbsp;|&nbsp; 🗑 = done/eaten (clears without affecting main)</div>
  <div class="undo-bar" id="undoBar"></div>
  <div style="display:flex;gap:5px;align-items:center;margin-top:8px;flex-wrap:wrap">
    <select id="mealSel" style="font-size:12px;padding:4px 7px;border:1px solid #ccc;border-radius:4px"><option value="">Select item to add…</option></select>
    <button class="primary sm" onclick="addToMealFromSel()">→ Move to meal bag</button>
  </div>
</div>

<!-- ADD SECTION BAR -->
<div class="add-section-bar">
  <input type="text" id="newSectionName" placeholder="New section name…">
  <button class="primary" onclick="addSection()">+ Add Section</button>
</div>

<div id="cats"></div>

<div class="backdrop" id="modal">
<div class="modal">
  <h3 id="mTitle">Add item</h3>
  <div class="fr"><label>Name</label><input id="mName"></div>
  <div class="fr"><label>Category</label>
    <select id="mCat"></select>
  </div>
  <div class="fr"><label>Bin</label>
    <select id="mBin">
      <option value="">— none</option>
      <option value="T">Top</option>
      <option value="L">Left</option>
      <option value="R">Right</option>
    </select>
  </div>
  <div class="fr"><label>Qty (number only)</label><input id="mQty" type="text" placeholder="blank = none/unknown"></div>
  <div class="fr"><label>Unit</label><input id="mUnit" placeholder="e.g. svgs, g, slices, lbs"></div>
  <div class="fr"><label>Note</label><textarea id="mNote"></textarea></div>
  <div id="calcWrap" style="display:none">
    <div class="calc-box">
      <b>Raw → cooked calculator</b><br><br>
      Enter grams raw:<input type="number" id="calcG" oninput="calcCooked()"> g → <span id="calcOut" style="font-weight:500"></span> cooked 4-oz svgs
      <div style="font-size:10px;color:#777;margin-top:3px">Formula: g × 0.75 ÷ 113.4</div>
    </div>
  </div>
  <div class="modal-btns">
    <button onclick="closeModal()">Cancel</button>
    <button class="danger sm" onclick="delItem()">Delete</button>
    <button class="primary" onclick="saveItem()">Save</button>
  </div>
</div>
</div>

function loadState(){
  try{
    const s=localStorage.getItem(STORE_KEY);
    if(s){
      const d=JSON.parse(s);
      items=d.items||defaultItems;
      meal=d.meal||defaultMeal;
      mealLoc=d.mealLoc||"Right bin";
      collapsed=d.collapsed||{};
      nid=d.nid||400;
      nmid=d.nmid||50;
      cats=d.cats||defaultCats;
    } else {
      resetDefaults();
    }
  } catch(e){resetDefaults();}
  undoStack=[];
}

function resetDefaults(){
  items=JSON.parse(JSON.stringify(defaultItems));
  meal=JSON.parse(JSON.stringify(defaultMeal));
  mealLoc="Right bin";
  collapsed={};
  nid=400;nmid=50;
  cats=JSON.parse(JSON.stringify(defaultCats));
}

function save(){
  try{
    localStorage.setItem(STORE_KEY,JSON.stringify({items,meal,mealLoc,collapsed,nid,nmid,cats}));
    const ind=document.getElementById("saveInd");
    ind.textContent="✓ Saved";
    setTimeout(()=>ind.textContent="",1800);
  }catch(e){}
}

function populateCatSelect(){
  const sel=document.getElementById("mCat");
  const cur=sel.value;
  sel.innerHTML="";
  cats.forEach(c=>{
    const o=document.createElement("option");
    o.value=c;o.textContent=c;
    if(c===cur) o.selected=true;
    sel.appendChild(o);
  });
}

function addSection(){
  const inp=document.getElementById("newSectionName");
  const name=inp.value.trim();
  if(!name){alert("Enter a section name.");return;}
  if(cats.includes(name)){alert("Section already exists.");return;}
  cats.push(name);
  inp.value="";
  save();render();
}

function renameSection(oldName){
  const newName=prompt("Rename section:",oldName);
  if(!newName||newName.trim()===oldName) return;
  const n=newName.trim();
  if(cats.includes(n)){alert("That name already exists.");return;}
  cats=cats.map(c=>c===oldName?n:c);
  items=items.map(i=>i.cat===oldName?{...i,cat:n}:i);
  if(collapsed[oldName]){collapsed[n]=collapsed[oldName];delete collapsed[oldName];}
  save();render();
}

function deleteSection(name){
  const count=items.filter(i=>i.cat===name).length;
  if(count>0){
    if(!confirm(`Delete section "${name}"? It has ${count} item(s). They will be moved to the first section.`)) return;
    const firstCat=cats.find(c=>c!==name)||"Uncategorized";
    items=items.map(i=>i.cat===name?{...i,cat:firstCat}:i);
  } else {
    if(!confirm(`Delete empty section "${name}"?`)) return;
  }
  cats=cats.filter(c=>c!==name);
  delete collapsed[name];
  save();render();
}

function render(){
  populateCatSelect();
  populateMealSel();
  renderMeal();
  const q=document.getElementById("srch").value.toLowerCase();
  const bf=document.getElementById("binF").value;
  let html="";
  cats.forEach(cat=>{
    let rows=items.filter(i=>{
      if(i.cat!==cat) return false;
      if(q&&!i.name.toLowerCase().includes(q)&&!(i.note||"").toLowerCase().includes(q)) return false;
      if(bf&&i.bin!==bf) return false;
      return true;
    });
    if(q&&!rows.length) return;
    const col=collapsed[cat];
    const esc=cat.replace(/'/g,"\\'").replace(/"/g,"&quot;");
    html+=`<div class="section">
      <div class="sec-head">
        <span class="sec-toggle" onclick="toggleCat('${esc}')">${cat} <span class="arr">${col?"▶":"▼"}</span></span>
        <div class="sec-head-btns">
          <button class="sec-head-btn" onclick="renameSection('${esc}')">✎ Rename</button>
          <button class="sec-head-btn del" onclick="deleteSection('${esc}')">✕ Delete</button>
        </div>
      </div>
      ${col?"":renderTable(rows,cat)}
    </div>`;
  });
  document.getElementById("cats").innerHTML=html;
}

function renderTable(rows,cat){
  let t=`<table>
  <colgroup><col style="width:33%"><col style="width:11%"><col style="width:22%"><col style="width:12%"><col style="width:22%"></colgroup>
  <tr><th>Item</th><th>Bin</th><th>Qty</th><th>Unit</th><th></th></tr>`;
  rows.forEach(it=>{
    const inMeal=meal.filter(m=>m.name===it.name);
    const mealQty=inMeal.reduce((a,m)=>a+m.qty,0);
    const isZero=it.qty===0;
    const isNull=it.qty===null;
    const qtyDisplay=isNull?"—":it.qty;
    t+=`<tr>
      <td>
        <div class="item-name">${it.name}${mealQty>0?`<span class="meal-tag">${mealQty} in bag</span>`:''}${isZero&&!mealQty?'<span class="zero-tag">out</span>':''}</div>
        ${it.note?`<div class="item-note">${it.note}</div>`:""}
        ${it.calc?`<div class="calc-box" style="margin-top:4px">
          Raw g:<input type="number" style="width:60px;padding:2px 4px;border:1px solid #ccc;border-radius:3px;font-size:11px;margin:0 3px" oninput="calcInline(this)">→ <span class="calc-res" style="font-weight:500"></span> cooked 4-oz svgs
        </div>`:""}
      </td>
      <td>
        <select class="bin-sel" onchange="items.find(x=>x.id===${it.id}).bin=this.value;save()">
          <option value="" ${!it.bin?"selected":""}>—</option>
          <option value="T" ${it.bin==="T"?"selected":""}>Top</option>
          <option value="L" ${it.bin==="L"?"selected":""}>Left</option>
          <option value="R" ${it.bin==="R"?"selected":""}>Right</option>
        </select>
      </td>
      <td>
        <div class="qty-wrap">
          <button class="icon" onclick="adjMain(${it.id},-1)">−</button>
          <span class="qty-val">${qtyDisplay}</span>
          <button class="icon" onclick="adjMain(${it.id},1)">+</button>
        </div>
      </td>
      <td style="font-size:11px;color:#666">${it.unit||""}</td>
      <td>
        <button class="sm" onclick="movToMeal(${it.id})" style="margin-bottom:2px">→ Meal</button>
        <button class="sm" onclick="openEdit(${it.id})">✎ Edit</button>
      </td>
    </tr>`;
  });
  // Add item directly to this section
  t+=`<tr><td colspan="5" style="padding:6px">
    <button class="sm primary" onclick="openAddToSection('${cat.replace(/'/g,"\\'")}')">+ Add item to this section</button>
  </td></tr>`;
  t+="</table>";
  return t;
}

function adjMain(id,delta){
  const it=items.find(x=>x.id===id);
  if(!it) return;
  const cur=it.qty===null?0:it.qty;
  it.qty=Math.max(0,parseFloat((cur+delta).toFixed(2)));
  save();render();
}

function calcInline(inp){
  const g=parseFloat(inp.value);
  const res=inp.parentElement.querySelector(".calc-res");
  if(res) res.textContent=isNaN(g)?"":(g*0.75/113.4).toFixed(2);
}

function movToMeal(id){
  const it=items.find(x=>x.id===id);
  if(!it) return;
  const max=it.qty===null?0:it.qty;
  if(max<=0){alert("No qty available in main to move.");return;}
  const amt=parseFloat(prompt(`Move how many ${it.unit||"svgs"} of "${it.name}" to meal bag?\nAvailable: ${max}`,"1"));
  if(isNaN(amt)||amt<=0) return;
  if(amt>max){alert("Not enough in main.");return;}
  it.qty=parseFloat((it.qty-amt).toFixed(2));
  const existing=meal.find(m=>m.name===it.name);
  if(existing) existing.qty=parseFloat((existing.qty+amt).toFixed(2));
  else meal.push({id:nmid++,name:it.name,qty:amt,unit:it.unit||"svgs"});
  save();render();
}

function renderMeal(){
  document.getElementById("mealLocBtn").textContent="📍 "+mealLoc;
  const g=document.getElementById("mealGrid");
  if(!meal.length){g.innerHTML='<span style="font-size:11px;color:#999">No items in meal bag.</span>';return;}
  g.innerHTML=meal.map(m=>`
    <div class="meal-item">
      <span class="meal-item-name">${m.name}</span>
      <button class="icon" style="font-size:11px;padding:1px 6px" title="Put 1 back to main" onclick="mealPutBack(${m.id})">+</button>
      <span class="meal-item-qty">${m.qty}</span>
      <span class="meal-item-unit">${m.unit||""}</span>
      <button class="icon" style="font-size:11px;padding:1px 6px" title="Ate 1 serving" onclick="mealEat(${m.id})">−</button>
      <button title="Cancel — put all back to main" onclick="mealCancel(${m.id})" style="background:none;border:1px solid #f0a0a0;border-radius:4px;cursor:pointer;color:#c00;font-size:11px;padding:1px 5px">✕</button>
      <button title="Done/eaten — clear without affecting main" onclick="mealClear(${m.id})" style="background:none;border:1px solid #ccc;border-radius:4px;cursor:pointer;color:#666;font-size:11px;padding:1px 5px">🗑</button>
    </div>`).join("");
}

function mealEat(mid){
  const m=meal.find(x=>x.id===mid);
  if(!m) return;
  undoStack.push({type:"eat",snap:JSON.parse(JSON.stringify(m))});
  m.qty=parseFloat((m.qty-1).toFixed(2));
  if(m.qty<=0) meal=meal.filter(x=>x.id!==mid);
  save();render();showUndo();
}

function mealPutBack(mid){
  const m=meal.find(x=>x.id===mid);
  if(!m) return;
  undoStack.push({type:"putback",snap:JSON.parse(JSON.stringify(m)),itemsSnap:JSON.parse(JSON.stringify(items))});
  m.qty=parseFloat((m.qty-1).toFixed(2));
  putBackToMain(m.name,1,m.unit);
  if(m.qty<=0) meal=meal.filter(x=>x.id!==mid);
  save();render();showUndo();
}

function mealCancel(mid){
  const m=meal.find(x=>x.id===mid);
  if(!m) return;
  undoStack.push({type:"cancel",snap:JSON.parse(JSON.stringify(m)),itemsSnap:JSON.parse(JSON.stringify(items))});
  putBackToMain(m.name,m.qty,m.unit);
  meal=meal.filter(x=>x.id!==mid);
  save();render();showUndo();
}

function mealClear(mid){
  undoStack.push({type:"clear",snap:JSON.parse(JSON.stringify(meal.find(x=>x.id===mid)))});
  meal=meal.filter(x=>x.id!==mid);
  save();render();showUndo();
}

function clearMealBag(){
  if(!confirm("Clear entire meal bag? This will NOT put items back to main.")) return;
  undoStack.push({type:"clearAll",snap:JSON.parse(JSON.stringify(meal))});
  meal=[];
  save();render();showUndo();
}

function putBackToMain(name,amt,unit){
  const it=items.find(x=>x.name===name);
  if(!it) return;
  const cur=it.qty===null?0:it.qty;
  it.qty=parseFloat((cur+amt).toFixed(2));
}

function showUndo(){
  const bar=document.getElementById("undoBar");
  if(!undoStack.length){bar.innerHTML="";return;}
  bar.innerHTML=`<span style="color:#888">Last action undoable.</span><button class="sm" onclick="doUndo()">↩ Undo</button>`;
}

function doUndo(){
  const last=undoStack.pop();
  if(!last) return;
  if(last.type==="eat"){
    const ex=meal.find(x=>x.id===last.snap.id);
    if(ex) ex.qty=last.snap.qty;
    else meal.push(last.snap);
  } else if(last.type==="putback"||last.type==="cancel"){
    items=last.itemsSnap;
    const ex=meal.find(x=>x.id===last.snap.id);
    if(ex) ex.qty=last.snap.qty;
    else meal.push(last.snap);
  } else if(last.type==="clear"){
    meal.push(last.snap);
  } else if(last.type==="clearAll"){
    meal=last.snap;
  }
  save();render();showUndo();
}

function addToMealFromSel(){
  const sel=document.getElementById("mealSel");
  const name=sel.value;
  if(!name) return;
  const it=items.find(x=>x.name===name);
  if(!it) return;
  movToMeal(it.id);
  sel.value="";
}

function populateMealSel(){
  const sel=document.getElementById("mealSel");
  const cur=sel.value;
  sel.innerHTML='<option value="">Select item to add…</option>';
  items.forEach(i=>{
    const o=document.createElement("option");
    o.value=i.name;o.textContent=i.name+(i.qty!==null?" ("+i.qty+" "+i.unit+")":"");
    if(i.name===cur) o.selected=true;
    sel.appendChild(o);
  });
}

function editMealLoc(){
  const v=prompt("Meal bag location:",mealLoc);
  if(v!==null&&v.trim()){mealLoc=v.trim();save();render();}
}

function toggleCat(cat){collapsed[cat]=!collapsed[cat];save();render();}

let editId=null;
let preselectCat=null;

function openAdd(){
  editId=null;
  document.getElementById("mTitle").textContent="Add item";
  populateCatSelect();
  document.getElementById("mName").value="";
  if(preselectCat) document.getElementById("mCat").value=preselectCat;
  preselectCat=null;
  document.getElementById("mBin").value="";
  document.getElementById("mQty").value="";
  document.getElementById("mUnit").value="svgs";
  document.getElementById("mNote").value="";
  document.getElementById("calcWrap").style.display="none";
  document.getElementById("modal").classList.add("open");
}

function openAddToSection(cat){
  preselectCat=cat;
  openAdd();
}

function openEdit(id){
  editId=id;
  const it=items.find(x=>x.id===id);
  if(!it) return;
  document.getElementById("mTitle").textContent="Edit: "+it.name;
  populateCatSelect();
  document.getElementById("mName").value=it.name;
  document.getElementById("mCat").value=it.cat;
  document.getElementById("mBin").value=it.bin||"";
  document.getElementById("mQty").value=it.qty===null?"":it.qty;
  document.getElementById("mUnit").value=it.unit||"";
  document.getElementById("mNote").value=it.note||"";
  document.getElementById("calcWrap").style.display=it.calc?"block":"none";
  document.getElementById("modal").classList.add("open");
}

function closeModal(){document.getElementById("modal").classList.remove("open");}

function saveItem(){
  const name=document.getElementById("mName").value.trim();
  if(!name){alert("Name required.");return;}
  const qStr=document.getElementById("mQty").value.trim();
  const qty=qStr===""?null:parseFloat(qStr);
  const obj={name,cat:document.getElementById("mCat").value,bin:document.getElementById("mBin").value,
    qty:isNaN(qty)?null:qty,unit:document.getElementById("mUnit").value.trim(),note:document.getElementById("mNote").value.trim()};
  if(editId){
    const idx=items.findIndex(x=>x.id===editId);
    if(idx>-1) items[idx]={...items[idx],...obj};
  } else {
    items.push({id:nid++,...obj});
  }
  closeModal();save();render();
}

function delItem(){
  if(!editId) return;
  if(confirm("Delete this item?")){items=items.filter(x=>x.id!==editId);closeModal();save();render();}
}

function calcCooked(){
  const g=parseFloat(document.getElementById("calcG").value);
  document.getElementById("calcOut").textContent=isNaN(g)?"":(g*0.75/113.4).toFixed(2);
}

function dl(){
  const state=localStorage.getItem(STORE_KEY)||"{}";
  const blob=new Blob([document.documentElement.outerHTML],{type:"text/html"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="freezer_inventory_backup.html";a.click();
}

// JSONBIN SYNC
var JBIN_URL="https://api.jsonbin.io/v3/b/69cc9d32aaba882197b2c2bc";
var JBIN_KEY="$2a$10$tpjsSaIqmjzoWXjpvpu7n.AdJJdQf8JUbDhBDfNoCC5rzN0vxDh/m";

function setSyncStatus(msg,cls){
  var el=document.getElementById('sync-status');
  if(el){el.textContent=msg;el.style.color=cls==='sync-ok'?'#2e7d32':cls==='sync-err'?'#c04a2a':'#b07d20';}
}

function pushToGoogle(){
  var state={items,meal,mealLoc,collapsed,nid,nmid,cats};
  setSyncStatus('Saving...','sync-pending');
  fetch(JBIN_URL,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':JBIN_KEY,'X-Bin-Versioning':'false'},body:JSON.stringify(state)})
  .then(r=>r.json())
  .then(()=>setSyncStatus('Saved '+new Date().toLocaleTimeString(),'sync-ok'))
  .catch(()=>setSyncStatus('Save failed','sync-err'));
}

function pullFromGoogle(){
  setSyncStatus('Loading...','sync-pending');
  fetch(JBIN_URL+'/latest',{method:'GET',headers:{'X-Master-Key':JBIN_KEY}})
  .then(r=>r.json())
  .then(resp=>{
    var d=resp.record;
    if(d&&d.items){
      items=d.items;meal=d.meal||defaultMeal;mealLoc=d.mealLoc||'Right bin';
      collapsed=d.collapsed||{};nid=d.nid||400;nmid=d.nmid||50;
      cats=d.cats||defaultCats;
      save();render();
      setSyncStatus('Loaded '+new Date().toLocaleTimeString(),'sync-ok');
    } else {
      setSyncStatus('Nothing saved yet','sync-err');
    }
  })
  .catch(()=>setSyncStatus('Could not connect','sync-err'));
}

document.getElementById("modal").addEventListener("click",function(e){if(e.target===this)closeModal();});
loadState();render();
</script>
